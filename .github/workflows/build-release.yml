name: Build Release

on:
    push:
        tags:
            - "v*"
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        name: Build on ${{ matrix.os }}
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                include:
                    - os: ubuntu-latest
                      rid: linux-x64
                    - os: windows-latest
                      rid: win-x64
                    - os: macos-latest
                      rid: osx-x64

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore

            - name: Publish
              run: >
                  dotnet publish
                  Reversi/Reversi.csproj
                  -c Release
                  -r ${{ matrix.rid }}
                  --self-contained true
                  -p:PublishSingleFile=true
                  -p:DebugType=None
                  -o publish

            - name: Zip artifact (Linux/macOS)
              if: runner.os != 'Windows'
              shell: bash
              run: |
                  cd publish
                  zip -r ../${{ github.event.repository.name }}-${{ matrix.rid }}.zip .

            - name: Zip artifact (Windows)
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  Compress-Archive -Path publish\* -DestinationPath "${{ github.event.repository.name }}-${{ matrix.rid }}.zip"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.rid }}
                  path: ${{ github.event.repository.name }}-${{ matrix.rid }}.zip

    build-portable:
        name: Build cross-platform (portable)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore

            - name: Publish (framework-dependent, cross-platform)
              run: >
                  dotnet publish
                  Reversi/Reversi.csproj
                  -c Release
                  -p:UseAppHost=false
                  -p:DebugType=None
                  -o publish

            - name: Zip artifact
              run: |
                  cd publish
                  zip -r ../${{ github.event.repository.name }}-portable.zip .

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: portable
                  path: ${{ github.event.repository.name }}-portable.zip

    release:
        name: Create Release
        needs: [build, build-portable]
        if: startsWith(github.ref, 'refs/tags/')
        runs-on: ubuntu-latest
        steps:
            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: artifacts

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                  files: artifacts/**/*.zip
                  generate_release_notes: true
